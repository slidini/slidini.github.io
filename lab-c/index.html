<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Olivier Lewandowski (57839) - PTW LAB C</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>

</head>
<header>
    <h1> INTERACTIVE MAP PUZZLE GAME </h1>
</header>

<body>

<div class="container">
    <div class="left-side">

        <div id="display">
            <p class="containerText">MAP DISPLAY:</p>
            <div id="map"></div>
        </div>

        <div id="buttons">
            <button id="getCurrLocation">GET CURRENT LOCATION</button>
            <button id="saveCurrentMap" >SAVE CURRENT MAP</button>
        </div>

        <div>
            <p class="containerText">YOUR POSITION:</p>
            <div id="position">
                <p id="x" class="coords">X</p>
                <p id="y" class="coords">Y</p>
            </div>
        </div>

    </div>

<div class="right-side">
        <div id="drop">
            <p class="containerText">DROP HERE:</p>
            <div id="puzzleDragDrop" class="dropContainer">
            </div>
        </div>

        <div id="drag">
            <p class="containerText">DRAG FROM HERE:</p>
            <div id="mapSaved"></div>
        </div>
    </div>
</div>
<button id="Notif">notify me</button>
</body>
<footer>

</footer>
</html>
