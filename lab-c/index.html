    <h1> INTERACTIVE MAP PUZZLE GAME </h1>

<body>

<div class="container">
    <div id="display">
        <p class="containerText">MAP DISPLAY:</p>
        <div id="map"></div>
    </div>

    <div id="drop">
        <p class="containerText">DROP HERE:</p>
        <div id="puzzleDragDrop" class="dropContainer">

        </div>
    </div>

    <div>
        <button id="getCurrLocation" onclick="getLocation()">GET CURRENT LOCATION</button>
        <button id="saveCurrentMap" >SAVE CURRENT MAP</button>
    </div>

    <div id="drag">
        <p class="containerText">DRAG FROM HERE:</p>
        <div id="mapSaved"></div>
    </div>

</div>

<div id="position">
    <p>Your position:</p>
    <p id="x">X</p>
    <p id="y">Y</p>
</div>

<button id="Notif">Notify me</button>

</body>
